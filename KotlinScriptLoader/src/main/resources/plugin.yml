name: KotlinScriptLoader
version: ${version}
main: ru.privateserver.ksl.KotlinScriptLoaderPlugin
api-version: '1.21'
author: PrivateServer
description: Приватный hot-reload загрузчик .kts скриптов
softdepend: [PlaceholderAPI, LuckPerms, Essentials, Vault, SkinsRestorer, WorldEdit, WorldGuard]
commands:
  ksl:
    description: Управление KotlinScriptLoader
    usage: /ksl [reload|addons|services|libraries|discord|sandbox|errors|doctor|validate]
    permission: ksl.admin
permissions:
  ksl.admin:
    description: Полный доступ к командам KotlinScriptLoader
    default: op
